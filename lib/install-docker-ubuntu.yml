---
# install-docker-ubuntu.yml
# Install Docker Engine from Docker's official APT repo on Ubuntu (incl. 24.04).
# ansible-playbook -i inventory.ini install-docker-ubuntu.yml

- name: Install Docker Engine on Ubuntu
  hosts: docker_hosts
  become: true
  gather_facts: true

  vars:
    docker_users:
      - jmromer
    docker_remove_old_packages: true
    docker_configure_daemon_json: false
    docker_daemon_json:
      log-driver: json-file
      log-opts:
        max-size: "10m"
        max-file: "3"
      storage-driver: overlay2
      live-restore: true

  tasks:
    - name: Remove old Docker-related packages
      ansible.builtin.apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent
      when: docker_remove_old_packages
      tags: [docker, cleanup]

    - name: Install prerequisite packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - apt-transport-https
        state: present
        update_cache: true
      tags: [docker, packages]

    - name: Ensure apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      tags: [docker, repo]

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      tags: [docker, repo]

    - name: Get dpkg architecture
      ansible.builtin.command: dpkg --print-architecture
      register: docker_dpkg_arch
      changed_when: false
      tags: [docker, repo]

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ docker_dpkg_arch.stdout }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present
      tags: [docker, repo]

    - name: Install Docker Engine packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
      tags: [docker, packages]

    - name: Ensure docker group exists
      ansible.builtin.group:
        name: docker
        state: present
      tags: [docker, users]

    - name: Add users to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
        state: present
      loop: "{{ docker_users }}"
      tags: [docker, users]

    - name: Optionally write /etc/docker/daemon.json
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: "{{ docker_daemon_json | to_nice_json }}\n"
        mode: "0644"
      when: docker_configure_daemon_json
      notify: Restart docker
      tags: [docker, config]

    - name: Enable and start containerd
      ansible.builtin.systemd:
        name: containerd
        enabled: true
        state: started
      tags: [docker, service]

    - name: Enable and start docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
      tags: [docker, service]

    - name: Verify docker client version
      ansible.builtin.command: docker --version
      register: docker_cli_version
      changed_when: false
      tags: [docker, verify]

    - name: Verify docker compose plugin version
      ansible.builtin.command: docker compose version
      register: docker_compose_version
      changed_when: false
      tags: [docker, verify]

    - name: Show installed versions
      ansible.builtin.debug:
        msg:
          - "{{ docker_cli_version.stdout }}"
          - "{{ docker_compose_version.stdout }}"
          - "Users added to docker group: {{ docker_users | join(', ') }}"
          - "Open a new login session or run 'newgrp docker' before using docker without sudo."
      tags: [docker, verify]

  handlers:
    - name: Restart docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
