default_provider: gpt-oss-cloud

providers:
  nemotron3-nano:
    base_url: "http://localhost:1234/v1"
    model: "nvidia/nemotron-3-nano"
    api_key_env: "LMSTUDIO_API_KEY"
    protocol: "chat"

  gpt-oss-cloud:
    base_url: "http://localhost:11434/v1"
    model: "gpt-oss:120b-cloud"
    api_key_env: "OLLAMA_API_KEY"
    protocol: "chat"

  gemma4-e2b:
    base_url: "http://localhost:11434/v1"
    model: "gemma4:e2b"
    api_key_env: "OLLAMA_API_KEY"
    protocol: "chat"

  qwen2.5-7b:
    base_url: "http://localhost:11434/v1"
    model: "qwen2.5:7b"
    api_key_env: "OLLAMA_API_KEY"
    protocol: "responses"

  qwen2.5-14b:
    base_url: "http://localhost:11434/v1"
    model: "qwen2.5:14b"
    api_key_env: "OLLAMA_API_KEY"
    protocol: "responses"

  qwen2.5-32b:
    base_url: "http://localhost:11434/v1"
    model: "qwen2.5:32b"
    api_key_env: "OLLAMA_API_KEY"
    protocol: "responses"

  openai:
    base_url: "https://api.openai.com/v1"
    model: "gpt-4.1-mini"
    api_key_env: "OPENAI_API_KEY_GIT"
    protocol: "responses"
